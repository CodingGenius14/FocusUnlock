<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FocusUnlock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="panel popup-page">
    <main class="card popup-shell">
      <header class="popup-header">
        <div>
          <h1>FocusUnlock</h1>
          <p class="popup-subtitle">Earn focused minutes to unlock all sites</p>
        </div>
        <p id="unlock-status" class="status-pill popup-status">Loading...</p>
      </header>

      <section class="popup-metrics">
        <div class="metric-card">
          <p class="metric-label">Progress</p>
          <p id="progress-text" class="metric-value">Checking progress...</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Remaining</p>
          <p id="remaining-text" class="metric-value">--</p>
        </div>
      </section>

      <section class="popup-progress">
        <div class="progress-top">
          <span>Session unlock</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-track popup-progress-track">
          <div id="progress-fill" class="progress-fill popup-progress-fill"></div>
        </div>
      </section>

      <nav class="popup-links">
        <a class="popup-link-btn" href="options.html" target="_blank" rel="noreferrer">Settings</a>
        <a class="popup-link-btn ghost" href="stats.html" target="_blank" rel="noreferrer">Stats</a>
      </nav>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
