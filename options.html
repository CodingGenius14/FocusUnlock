<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FocusUnlock Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page settings-page">
    <main class="card wide settings-shell">
      <header class="settings-header">
        <h1>FocusUnlock Settings</h1>
        <p>Configure the work-site allowlist. Every other website stays blocked until your focus quota is complete.</p>
      </header>

      <section class="settings-section">
        <div class="settings-row">
          <label for="work-sites">Work Sites</label>
          <p class="field-help">One domain per line. These are the only sites accessible before your timer is complete.</p>
          <textarea id="work-sites" rows="8" placeholder="github.com&#10;jira.com&#10;notion.so"></textarea>
        </div>
      </section>

      <section class="settings-section">
        <div class="settings-row">
          <label for="quota-minutes">Focus Quota (minutes)</label>
          <p class="field-help">How many focused minutes are required before all other sites unlock.</p>
          <input id="quota-minutes" type="number" min="1" />
        </div>
      </section>

      <footer class="settings-actions">
        <button id="save-settings" type="button">Save Settings</button>
        <p id="save-feedback" class="save-feedback" aria-live="polite"></p>
      </footer>
    </main>
    <script src="options.js"></script>
  </body>
</html>
