<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Assistance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page ai-page control-page">
    <main class="control-shell">
      <aside class="control-sidebar">
        <div class="brand-block">
          <p class="brand-title">FOCUS_CORE</p>
          <p class="brand-subtitle">v2.0.4 · ACTIVE</p>
        </div>
        <nav class="control-nav" aria-label="Control Center">
          <a href="options.html" class="nav-item">Settings</a>
          <a href="ai.html" class="nav-item active">AI Assistance</a>
          <a href="stats.html" class="nav-item">Stats</a>
        </nav>
      </aside>

      <section class="control-main">
        <header class="control-topbar">
          <p class="section-kicker">COGNITIVE_ASSIST</p>
          <h1>AI Assistance</h1>
          <p class="field-help">Generate a recommended work-site plan and apply it directly to your settings.</p>
        </header>

        <div class="control-grid two-col">
          <section class="ai-section">
            <label for="goal-input">Mission Goal</label>
            <textarea
              id="goal-input"
              rows="6"
              placeholder="Example: Finish assignment writeups, review linear algebra, and complete interview prep this week."
            ></textarea>
            <div class="ai-actions">
              <button id="generate-ai" type="button">Generate AI Plan</button>
              <span id="ai-status" class="ai-status" aria-live="polite"></span>
            </div>
          </section>

          <section class="ai-section">
            <div class="ai-section-head">
              <h2>Recommended Work Sites</h2>
              <button id="apply-selected" type="button" class="secondary-btn">Apply Selected</button>
            </div>
            <div id="site-recommendations" class="ai-site-list"></div>
          </section>
        </div>

        <div class="control-grid two-col ai-bottom-grid">
          <section class="ai-section">
            <h2>Suggested Time Plan</h2>
            <div id="time-plan" class="ai-plan-list"></div>
          </section>

          <section class="ai-section">
            <h2>Focus Strategy</h2>
            <ul id="focus-plan" class="ai-tip-list"></ul>
          </section>
        </div>
      </section>
    </main>
    <script src="ai.js"></script>
  </body>
</html>
