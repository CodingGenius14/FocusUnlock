<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FocusUnlock Stats</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page stats-page">
    <main class="card wide stats-shell">
      <header class="stats-header">
        <h1>Focus Time by Website</h1>
        <p>Review how many focused minutes you have spent on each work site.</p>
      </header>

      <section class="stats-overview">
        <article class="stats-tile">
          <p class="stats-tile-label">Tracked Websites</p>
          <p id="stats-total-sites" class="stats-tile-value">--</p>
        </article>
        <article class="stats-tile">
          <p class="stats-tile-label">Focus Minutes (Current Session)</p>
          <p id="stats-total-minutes" class="stats-tile-value">--</p>
        </article>
        <article class="stats-tile">
          <p class="stats-tile-label">Tracked Minutes (All Websites)</p>
          <p id="stats-tracked-total-minutes" class="stats-tile-value">--</p>
        </article>
      </section>

      <p id="stats-status" class="stats-status">Loading sessions...</p>

      <ul id="sessions-list" class="sessions-list stats-list"></ul>
    </main>
    <script src="stats.js"></script>
  </body>
</html>
